name: Deploy Zones AI Advisory
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-and-deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install backend dependencies
        working-directory: backend
        run: npm install
      - name: Zip backend with node_modules
        run: cd backend && zip -r ../backend.zip . --exclude "*.git*"
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy backend via zip
        run: az webapp deploy --name zones-ai-advisory-api --resource-group zones-ai-advisory --src-path backend.zip --type zip --async true
      - name: Set startup command
        run: az webapp config set --name zones-ai-advisory-api --resource-group zones-ai-advisory --startup-file "node src/index.js"
      - name: Wait for backend health
        run: |
          echo "Polling backend health endpoint..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://zones-ai-advisory-api.azurewebsites.net/api/health || echo "000")
            echo "Attempt $i/24: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy."
              exit 0
            fi
            sleep 15
          done
          echo "Health check timed out after 6 minutes."
          exit 1
  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install and build frontend
        working-directory: frontend
        run: npm install && npm run build
      - name: Deploy frontend to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist
